<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroSpotter Ultra - 120+ Bases & Hubs</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.9);
            --accent-civil: #38bdf8;
            --accent-mil: #facc15;
            --text: #f1f5f9;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* UI Elements */
        #control-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            width: 380px; max-height: 90vh;
            background: var(--card); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .header h1 { font-size: 1.2rem; margin: 0; color: var(--accent-civil); }

        .search-container { position: relative; margin-bottom: 15px; }
        .search-container input {
            width: 100%; padding: 12px 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2);
            color: white; outline: none; box-sizing: border-box;
        }

        .filters { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-btn {
            flex: 1; padding: 8px; border-radius: 8px; border: none;
            cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.3s;
        }
        .btn-all { background: #475569; color: white; }
        .btn-civil { background: var(--accent-civil); color: #000; }
        .btn-mil { background: var(--accent-mil); color: #000; }

        .stats-bar {
            display: flex; justify-content: space-around; 
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 15px;
        }
        .stat-item { text-align: center; font-size: 0.75rem; }
        .stat-item div { font-size: 1.1rem; font-weight: bold; color: var(--accent-civil); }

        #list { overflow-y: auto; flex-grow: 1; border-radius: 10px; }
        .item {
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px;
        }
        .item:hover { background: rgba(255,255,255,0.05); }
        .type-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .type-civil { background: var(--accent-civil); box-shadow: 0 0 8px var(--accent-civil); }
        .type-mil { background: var(--accent-mil); box-shadow: 0 0 8px var(--accent-mil); }

        .item-info b { display: block; font-size: 0.95rem; }
        .item-info span { font-size: 0.75rem; color: #94a3b8; font-family: monospace; }

        #map { height: 100vh; width: 100vw; background: #0b0e14; }

        /* Popups */
        .leaflet-popup-content-wrapper { background: var(--bg); color: white; border-radius: 15px; padding: 5px; }
        .popup-mil { border-top: 5px solid var(--accent-mil); }
        .popup-civil { border-top: 5px solid var(--accent-civil); }
        
        /* Mobile Overlay */
        @media (max-width: 600px) {
            #control-panel { width: calc(100% - 40px); height: 40%; top: auto; bottom: 20px; }
        }
    </style>
</head>

            <input type="text" id="search" placeholder="Flugplatz oder ICAO suchen...">
        </div>

        <div class="filters">
            <button class="filter-btn btn-all" onclick="filterType('all')">Alle</button>
            <button class="filter-btn btn-civil" onclick="filterType('civil')">Zivil</button>
            <button class="filter-btn btn-mil" onclick="filterType('mil')">Militär</button>

        </div>

        <div id="list"></div>
    </div>

        // --- SETUP KARTE ---
        const map = L.map('map', { zoomControl: false }).setView([50, 10], 5);
        
        const layers = {
            "Radar Dark": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map),
            "Satellit": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            "Gelände (Topo)": L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png')
        };
        L.control.layers(layers).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const markers = L.layerGroup().addTo(map);
        let currentFilter = 'all';

        function render() {
            const list = document.getElementById('list');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            list.innerHTML = '';
            markers.clearLayers();

            let cCount = 0, mCount = 0;

            airports.forEach(ap => {
                const isVisible = (currentFilter === 'all' || ap.t === currentFilter) &&
                                  (ap.n.toLowerCase().includes(searchTerm) || ap.i.toLowerCase().includes(searchTerm));

                if (ap.t === 'civil') cCount++; else mCount++;

                if (isVisible) {
                    // Marker
                    const color = ap.t === 'civil' ? '#38bdf8' : '#facc15';
                    const icon = L.divIcon({
                        html: `<i class="fa-solid fa-plane" style="color:${color}; font-size:18px; filter:drop-shadow(0 0 3px black)"></i>`,
                        className: 'custom-icon', iconSize: [20, 20]
                    });

                    const m = L.marker([ap.lat, ap.lng], { icon: icon }).addTo(markers);
                    m.bindPopup(`
                        <div class="popup-${ap.t}">
                            <small style="color:${color}; font-weight:bold">${ap.t === 'civil' ? 'ZIVIL' : 'MILITÄR'}</small>
                            <h3 style="margin:5px 0">${ap.n} (${ap.i})</h3>
                            <p style="font-size:0.85rem">${ap.d}</p>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${ap.lat},${ap.lng}" target="_blank" 
                               style="color:${color}; text-decoration:none; font-weight:bold; font-size:0.8rem">→ Route planen</a>
                        </div>
                    `);

                    // List Item
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `
                        <div class="type-indicator type-${ap.t}"></div>
                        <div class="item-info">
                            <b>${ap.n}</b>
                            <span>${ap.i}</span>
                        </div>
                    `;
                    div.onclick = () => {
                        map.flyTo([ap.lat, ap.lng], 13);
                        setTimeout(() => m.openPopup(), 1200);
                    };
                    list.appendChild(div);
                }
            });

            document.getElementById('s-total').innerText = airports.length;
            document.getElementById('s-civil').innerText = cCount;
            document.getElementById('s-mil').innerText = mCount;
        }

        function filterType(type) {
            currentFilter = type;
            render();
        }

        document.getElementById('search').addEventListener('input', render);
        window.onload = render;
    </script>
</body>
