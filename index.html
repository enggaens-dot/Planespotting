<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroSpotter Ultra - Pro Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(15, 23, 42, 0.9);
            --accent-civil: #38bdf8;
            --accent-mil: #facc15;
            --accent-spot: #10b981; /* Grün für Spotting-Punkte */
            --text: #f1f5f9;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* UI Elements */
        #control-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            width: 350px; max-height: 85vh;
            background: var(--card); backdrop-filter: blur(15px);
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .header h1 { font-size: 1.1rem; margin: 0 0 15px 0; color: var(--accent-civil); text-transform: uppercase; letter-spacing: 1px; }

        input#search {
            width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3);
            color: white; margin-bottom: 10px; outline: none;
        }

        .filters { display: flex; gap: 5px; margin-bottom: 10px; }
        .filter-btn {
            flex: 1; padding: 6px; border-radius: 6px; border: none;
            cursor: pointer; font-weight: bold; font-size: 0.7rem; transition: 0.2s;
        }
        .btn-all { background: #475569; color: white; }
        .btn-civil { background: var(--accent-civil); color: #000; }
        .btn-mil { background: var(--accent-mil); color: #000; }

        #list { overflow-y: auto; flex-grow: 1; border-radius: 8px; background: rgba(0,0,0,0.2); }
        .item {
            padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.85rem;
        }
        .item:hover { background: rgba(56, 189, 248, 0.1); }
        .type-indicator { width: 6px; height: 6px; border-radius: 50%; }

        #map { height: 100vh; width: 100vw; background: #0b0e14; }

        /* Tooltips */
        .leaflet-tooltip {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: white !important; font-weight: bold !important;
            text-shadow: 1px 1px 3px black !important; font-size: 11px !important;
            pointer-events: none !important;
        }

        /* Spotting Dots Style */
        .spot-dot {
            background: var(--accent-spot);
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-spot);
        }

        /* Popups */
        .leaflet-popup-content-wrapper { background: #1e293b; color: white; border-radius: 10px; }
        .popup-civil { border-left: 5px solid var(--accent-civil); padding-left: 10px; }
        .popup-mil { border-left: 5px solid var(--accent-mil); padding-left: 10px; }
        .popup-spot { border-left: 5px solid var(--accent-spot); padding-left: 10px; }
        
        .route-btn {
            display: block; margin-top: 10px; padding: 6px;
            background: var(--accent-spot); color: white;
            text-align: center; border-radius: 5px; text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div class="header"><h1><i class="fa-solid fa-crosshairs"></i> EuroSpotter Radar</h1></div>
        <input type="text" id="search" placeholder="Suchen (Name oder ICAO)...">
        <div class="filters">
            <button class="filter-btn btn-all" onclick="filterType('all')">Alle</button>
            <button class="filter-btn btn-civil" onclick="filterType('civil')">Zivil</button>
            <button class="filter-btn btn-mil" onclick="filterType('mil')">Militär</button>
        </div>
        <div id="list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const airports = [
            // DEUTSCHLAND - ZIVIL mit Spotting-Punkten
            { n: "Frankfurt", i: "EDDF", t: "civil", lat: 50.033, lng: 8.570, d: "Hub. Spot: Startbahn West.",
              spots: [{n:"Affenfelsen", lat:49.9975, lng:8.5255}, {n:"Plattform T2", lat:50.052, lng:8.583}, {n:"Anflug 25", lat:50.0375, lng:8.5978}]},
            { n: "München", i: "EDDM", t: "civil", lat: 48.353, lng: 11.786, d: "A350 Hub. Spot: Besucherhügel.",
              spots: [{n:"Besucherhügel Nord", lat:48.363, lng:11.781}, {n:"Südbahn", lat:48.339, lng:11.831}]},
            { n: "Berlin", i: "EDDB", t: "civil", lat: 52.366, lng: 13.503, d: "BER Hauptflughafen.",
              spots: [{n:"Infotower", lat:52.361, lng:13.506}]},
            { n: "Düsseldorf", i: "EDDL", t: "civil", lat: 51.289, lng: 6.766, d: "Spotting am Fernbahnhof.",
              spots: [{n:"Bahnhofsterrasse", lat:51.296, lng:6.784}]},
            { n: "Hamburg", i: "EDDH", t: "civil", lat: 53.630, lng: 9.988, d: "Coffee to Fly.",
              spots: [{n:"Coffee to Fly", lat:53.644, lng:9.992}]},
            { n: "Leipzig", i: "EDDP", t: "civil", lat: 51.432, lng: 12.241, d: "DHL Hub & Antonovs.",
              spots: [{n:"Aussichtsturm", lat:51.425, lng:12.235}]},
            
            // MILITÄR DEUTSCHLAND
            { n: "Ramstein", i: "ETAR", t: "mil", lat: 49.436, lng: 7.600, d: "USAF Hub. C-17, C-5 Galaxy.",
              spots: [{n:"Anflug 26", lat:49.438, lng:7.635}, {n:"Spotter West", lat:49.433, lng:7.558}]},
            { n: "Spangdahlem", i: "ETAD", t: "mil", lat: 49.974, lng: 6.692, d: "USAF F-16 Fighting Falcon." },
            { n: "Nörvenich", i: "ETNN", t: "mil", lat: 50.831, lng: 6.658, d: "Eurofighter Typhoon.",
              spots: [{n:"Feldweg West", lat:50.828, lng:6.645}]},
            { n: "Büchel", i: "ETSB", t: "mil", lat: 50.175, lng: 7.063, d: "Tornados." },

            // EUROPA
            { n: "London Heathrow", i: "EGLL", t: "civil", lat: 51.470, lng: -0.454, d: "Mega Hub. A380.",
              spots: [{n:"Myrtle Avenue (27L)", lat:51.4632, lng:-0.4283}]},
            { n: "Amsterdam", i: "EHAM", t: "civil", lat: 52.308, lng: 4.764, d: "Polderbaan Spotterplatz.",
              spots: [{n:"Polderbaan", lat:52.355, lng:4.707}]},
            { n: "Zürich", i: "LSZH", t: "civil", lat: 47.464, lng: 8.549, d: "Swiss Hub & Heligrill.",
              spots: [{n:"Heligrill", lat:47.458, lng:8.529}]}
        ];

        const map = L.map('map', { zoomControl: false }).setView([50, 10], 5);
        
        const baseLayers = {
            "Radar Dark": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map),
            "Satellit": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
            "Gelände": L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png')
        };
        L.control.layers(baseLayers, null, { position: 'topright' }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const markersGroup = L.layerGroup().addTo(map);
        const spotsGroup = L.layerGroup(); // Separates Layer für Spot-Punkte
        let currentFilter = 'all';

        function updateView() {
            const list = document.getElementById('list');
            const search = document.getElementById('search').value.toLowerCase();
            list.innerHTML = '';
            markersGroup.clearLayers();
            spotsGroup.clearLayers();

            airports.forEach(ap => {
                const matchSearch = ap.n.toLowerCase().includes(search) || ap.i.toLowerCase().includes(search);
                const matchFilter = currentFilter === 'all' || ap.t === currentFilter;

                if (matchSearch && matchFilter) {
                    const color = ap.t === 'civil' ? '#38bdf8' : '#facc15';
                    
                    // Airport Marker
                    const icon = L.divIcon({
                        html: `<i class="fa-solid fa-plane" style="color:${color}; font-size:16px; filter:drop-shadow(0 0 2px black)"></i>`,
                        className: 'custom-icon', iconAnchor: [8, 8]
                    });

                    const m = L.marker([ap.lat, ap.lng], { icon: icon }).addTo(markersGroup);
                    m.bindTooltip(`${ap.n}`, { permanent: true, direction: 'bottom', offset: [0, 10], opacity: 0.9 });

                    m.bindPopup(`
                        <div class="popup-${ap.t}">
                            <b style="color:${color}">${ap.i}</b>
                            <h3 style="margin:2px 0">${ap.n}</h3>
                            <p style="font-size:0.8rem; margin:5px 0">${ap.d}</p>
                            <a href="https://www.google.com/maps/search/?api=1&query=${ap.lat},${ap.lng}" target="_blank" style="color:${color}; font-size:0.75rem; text-decoration:none;"><b>🗺️ Route öffnen</b></a>
                        </div>
                    `);

                    // Spotting-Punkte hinzufügen (falls vorhanden)
                    if (ap.spots) {
                        ap.spots.forEach(s => {
                            const sIcon = L.divIcon({ className: 'spot-dot', iconSize: [10, 10] });
                            const sm = L.marker([s.lat, s.lng], { icon: sIcon }).addTo(spotsGroup);
                            sm.bindPopup(`
                                <div class="popup-spot">
                                    <b style="color:var(--accent-spot)">📸 Spotting Punkt</b>
                                    <h4 style="margin:2px 0">${s.n}</h4>
                                    <p style="font-size:0.75rem">(${ap.n})</p>
                                    <a class="route-btn" href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank">Wegbeschreibung</a>
                                </div>
                            `);
                        });
                    }

                    // Sidebar Item
                    const item = document.createElement('div');
                    item.className = 'item';
                    item.innerHTML = `<div class="type-indicator" style="background:${color}"></div> <span><b>${ap.i}</b> - ${ap.n}</span>`;
                    item.onclick = () => {
                        map.flyTo([ap.lat, ap.lng], 14);
                        setTimeout(() => m.openPopup(), 1000);
                    };
                    list.appendChild(item);
                }
            });
            handleZoom();
        }

        function handleZoom() {
            const zoom = map.getZoom();
            // Namen erst ab Zoom 7
            document.querySelectorAll('.leaflet-tooltip').forEach(t => {
                t.style.display = zoom >= 7 ? 'block' : 'none';
            });
            // Spotting Punkte erst ab Zoom 12 einblenden
            if (zoom >= 12) {
                map.addLayer(spotsGroup);
            } else {
                map.removeLayer(spotsGroup);
            }
        }

        function filterType(type) {
            currentFilter = type;
            updateView();
        }

        map.on('zoomend', handleZoom);
        document.getElementById('search').addEventListener('input', updateView);
        window.onload = updateView;
    </script>
</body>
</html>
