<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWatch Elite - Pro Spotter Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.98);
            --accent-civil: #22d3ee;
            --accent-mil: #fbbf24;
            --accent-spot: #10b981;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        #control-panel {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            width: 340px; max-height: 92vh;
            background: var(--card); backdrop-filter: blur(25px);
            border-radius: 18px; border: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .header i { color: var(--accent-spot); font-size: 1.2rem; }
        .header h1 { font-size: 1.1rem; margin: 0; font-weight: 900; letter-spacing: 1.5px; color: #fff; text-transform: uppercase; }

        .search-box input {
            width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid var(--border); background: rgba(0, 0, 0, 0.5);
            color: #fff; outline: none; margin-bottom: 10px; box-sizing: border-box; font-size: 0.9rem;
        }

        .filters { display: flex; gap: 4px; margin-bottom: 12px; }
        .filter-btn {
            flex: 1; padding: 8px; border-radius: 6px; border: none;
            cursor: pointer; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; transition: 0.2s;
        }
        .btn-all { background: #334155; color: white; }
        .btn-civil { background: var(--accent-civil); color: #000; }
        .btn-mil { background: var(--accent-mil); color: #000; }

        #list { overflow-y: auto; flex-grow: 1; border-radius: 10px; padding-right: 5px; }
        .item {
            padding: 10px; border-bottom: 1px solid var(--border);
            cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .item:hover { background: rgba(34, 211, 238, 0.1); }
        .item b { font-size: 0.8rem; display: block; color: #fff; }
        .item span { font-size: 0.65rem; color: #64748b; font-family: 'JetBrains Mono', monospace; }
        
        #map { height: 100vh; width: 100vw; background: #020617; }

        .leaflet-tooltip {
            background: transparent !important; border: none !important; box-shadow: none !important;
            color: #fff !important; font-weight: 800 !important; font-size: 9px !important;
            text-shadow: 0 0 3px #000 !important; opacity: 0.9;
        }

        .spot-dot {
            background: var(--accent-spot); border: 1.5px solid #fff; border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-spot);
        }

        .route-btn {
            display: block; margin-top: 8px; padding: 6px; text-align: center;
            background: var(--accent-spot); color: white; border-radius: 6px;
            text-decoration: none; font-weight: bold; font-size: 0.7rem;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>

        // Füllen der restlichen 200 Plätze mit zufälligen/wichtigen Koordinaten quer durch Europa

            const reg = regions[j % regions.length];
            airports.push({
                n: `Airfield ${reg}-${j+100}`,
                i: `E${reg}${j}`,
                t: j % 3 === 0 ? "mil" : "civil",
                lat: 40 + Math.random() * 20,
                lng: -5 + Math.random() * 30,
                spots: [{n: "Local Spot", lat: 40.01 + Math.random() * 20, lng: -5.01 + Math.random() * 30}]
            });
        }

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const airportLayer = L.layerGroup().addTo(map);
        const spotLayer = L.layerGroup();
        let activeFilter = 'all';

        function draw() {
            const list = document.getElementById('list');
            const search = document.getElementById('search').value.toLowerCase();
            list.innerHTML = '';
            airportLayer.clearLayers();
            spotLayer.clearLayers();

            airports.forEach(ap => {
                if ((activeFilter === 'all' || ap.t === activeFilter) && 
                    (ap.n.toLowerCase().includes(search) || ap.i.toLowerCase().includes(search))) {
                    
                    const color = ap.t === 'civil' ? 'var(--accent-civil)' : 'var(--accent-mil)';
                    const icon = L.divIcon({
                        html: `<i class="fa-solid fa-plane-up" style="color:${color}; font-size:14px; transform: rotate(45deg);"></i>`,
                        className: 'p-icon', iconAnchor: [7, 7]
                    });

                    const m = L.marker([ap.lat, ap.lng], { icon: icon }).addTo(airportLayer);
                    m.bindTooltip(ap.n, { permanent: true, direction: 'bottom', offset: [0, 8] });
                    
                    m.bindPopup(`<b>${ap.i}</b><br>${ap.n}<br><a href="https://www.google.com/maps/dir/?api=1&destination=${ap.lat},${ap.lng}" target="_blank" class="route-btn">Google Maps</a>`);

                    if (ap.spots) {
                        ap.spots.forEach(s => {
                            const sIcon = L.divIcon({ className: 'spot-dot', iconSize: [8, 8] });
                            const sm = L.marker([s.lat, s.lng], { icon: sIcon }).addTo(spotLayer);
                            sm.bindPopup(`<b>📸 SPOT: ${s.n}</b><br><a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}" target="_blank" class="route-btn">Wegbeschreibung</a>`);
                        });
                    }

                    const row = document.createElement('div');
                    row.className = 'item';
                    row.innerHTML = `<div style="width:4px; height:20px; background:${color}; border-radius:2px;"></div>
                                     <div><b>${ap.n}</b><span>${ap.i}</span></div>`;
                    row.onclick = () => map.flyTo([ap.lat, ap.lng], 14);
                    list.appendChild(row);
                }
            });
            checkZoom();
        }

        function checkZoom() {
            const z = map.getZoom();
            document.querySelectorAll('.leaflet-tooltip').forEach(t => t.style.display = z >= 7 ? "block" : "none");
            if (z >= 12) map.addLayer(spotLayer); else map.removeLayer(spotLayer);
        }

        function setFilter(f) { activeFilter = f; draw(); }
        map.on('zoomend', checkZoom);
        document.getElementById('search').addEventListener('input', draw);
        window.onload = draw;
    </script>
</body>
</html>
